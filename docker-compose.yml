networks:
  photopro.net:
    driver: bridge

services:
  # Service d'infra et messagerie RabbitMQ
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "15672:15672"
      - "5672:5672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 8s
      timeout: 30s
      retries: 3
    networks:
      - photopro.net
    volumes:
      - ./rabbitmq.photo:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: photo
      RABBITMQ_DEFAULT_PASS: photo
    entrypoint: /bin/sh
    command: -c "if [ -f /var/lib/rabbitmq/.erlang.cookie ]; then chmod 600 /var/lib/rabbitmq/.erlang.cookie; fi && exec docker-entrypoint.sh rabbitmq-server"

  mailcatcher:
    build:
      context: build
      dockerfile: mailcatcher.Dockerfile
    ports:
      - "1081:1080"
      - "1025:1025"
    networks:
      - photopro.net

  # Gateways
  gateway_backoffice:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    ports:
      - '8081:80'
    volumes:
      - ./back/gateway-backoffice:/var/php
    working_dir: /var/php
    networks:
      - photopro.net
    command: sh -c "composer install && php -S 0.0.0.0:80 -t /var/php/public"

  api_storage:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    container_name: api_storage
    ports:
      - "6082:80"
    volumes:
      - ./back/app-storage:/var/php
    working_dir: /var/php
    command: sh -c "composer config process-timeout 3600 && composer install && php -S 0.0.0.0:80 -t public"    
    environment:
      - S3_INTERNAL_ENDPOINT=http://S3:8333
      - S3_EXTERNAL_ENDPOINT=http://localhost:8333
      - S3_REGION=seaweedFS
      - S3_ACCESS_KEY=GHIJKL
      - S3_SECRET_KEY=789012
      - S3_BUCKET=photopro-galeries
    networks:
      - photopro.net
    depends_on:
      - S3

  gateway_frontoffice:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    ports:
      - '8082:80'
    volumes:
      - ./back/gateway-frontoffice:/var/php
    working_dir: /var/php
    networks:
      - photopro.net
    command: sh -c "composer install && php -S 0.0.0.0:80 -t /var/php/public"

  # Microservices métiers
  # Service Galerie
  api_galerie:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    ports:
      - "6080:80"
    volumes:
      - ./back/app-galerie:/var/php
    env_file:
      - ./back/app-galerie/config/.env
    working_dir: /var/php
    networks:
      - photopro.net
    depends_on:
      galerie.db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    command: sh -c "composer install --ignore-platform-reqs || composer update --no-interaction --ignore-platform-reqs && php -S 0.0.0.0:80 -t /var/php/public"

  # Service Auth / Identité
  api_auth:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    ports:
      - "6081:80"
    volumes:
      - ./back/app-auth:/var/php
    env_file:
      - ./back/app-auth/config/.env
    working_dir: /var/php
    networks:
      - photopro.net
    depends_on:
      auth.db:
        condition: service_started
    command: sh -c "composer install && php -S 0.0.0.0:80 -t /var/php/public"

  # Service Notif
  app-mail:
    build:
      context: build
      dockerfile: 8.4-cli.Dockerfile
    volumes:
      - ./back/app-mail:/var/php
    env_file:
      - ./back/app-mail/config/.env
    working_dir: /var/php
    networks:
      - photopro.net
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: sh -c "composer install && php consumer.php || tail -f /dev/null"

  # BDs
  galerie.db:
    image: 'postgres:latest'
    env_file: ./back/app-galerie/config/.env
    environment:
      - POSTGRES_DB=galerie
      - POSTGRES_USER=galerie_user
      - POSTGRES_PASSWORD=galerie_password
    ports:
      - '5435:5432'
    networks:
      - photopro.net
    volumes:
      - ./sql/schema/galerie.schema.sql:/docker-entrypoint-initdb.d/03.schema.sql
      - ./sql/data/galerie.data.sql:/docker-entrypoint-initdb.d/04.data.sql

  auth.db:
    image: 'postgres:latest'
    env_file: ./back/app-auth/config/.env
    environment:
      - POSTGRES_DB=auth
      - POSTGRES_USER=auth_user
      - POSTGRES_PASSWORD=auth_password
    ports:
      - '5436:5432'
    networks:
      - photopro.net
    volumes:
      - ./sql/schema/auth.schema.sql:/docker-entrypoint-initdb.d/01.schema.sql
      - ./sql/data/auth.data.sql:/docker-entrypoint-initdb.d/02.data.sql

  adminer:
    image: adminer
    ports:
      - '8080:8080'
    networks:
      - photopro.net

  app-vue:
    image: node:22-alpine
    ports:
      - "5173:5173"
    volumes:
      - ./app-vue:/app
      - /app/node_modules
    working_dir: /app
    networks:
      - photopro.net
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
    command: sh -c "npm install || true && npm run dev -- --host"

  S3:
    image: chrislusf/seaweedfs:latest
    ports:
      - "8333:8333"
      - "9333:9333"
      - "23646:23646"
    command: "server -dir=/data -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json"    
    networks:
      - photopro.net
    volumes:
      - ./S3/data:/data
      - ./S3:/etc/seaweedfs